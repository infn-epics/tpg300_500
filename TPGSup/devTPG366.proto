###############################################################################
# StreamDevice protocol file for Pfeiffer Vacuum TPG 366 MaxiGauge
# 6-channel total pressure measurement and control unit for ActiveLine gauges
#
# Communication: Mnemonics protocol (3-char ASCII commands)
# Data format: 1 start bit, 8 data bits, no parity, 1 stop bit, no handshake
# Default baud: 9600
#
# Protocol flow:
#   HOST -> TPG366: MNEMONIC [,params] <CR>
#   TPG366 -> HOST: <ACK><CR><LF>
#   HOST -> TPG366: <ENQ>
#   TPG366 -> HOST: data <CR><LF>
###############################################################################

OutTerminator = CR;
InTerminator  = CR LF;

ReplyTimeout = 2000;
ReadTimeout  = 2500;
LockTimeout  = 10000;

###############################################################################
# Reconnect handler
###############################################################################
reconnect {
    out ETX;
    disconnect;
    connect 1000;
}

@replytimeout {
    reconnect;
}

@readtimeout {
    reconnect;
}

@mismatch {
    in NAK;
}

###############################################################################
# Reset interface - clear input buffer on controller
###############################################################################
reset_interface {
    out ETX;
}

###############################################################################
# Simple ACK/ENQ handshake
###############################################################################
enquery {
    in  ACK;
    out ENQ;
}

enquery_with_error {
    enquery;
    @mismatch {
        in NAK;
    }
}

###############################################################################
# AYT - Device identification
# Returns: designation, article number, serial number, FW ver, HW ver
# PV: stringin (raw string)
###############################################################################
identify_device_raw {
    out "AYT";
    enquery;
    in  "%#s";
}

###############################################################################
# PNR - Firmware version
# PV: stringin
###############################################################################
get_firmware_version {
    out "PNR";
    enquery;
    in  "%#s";
}

###############################################################################
# HDW - Hardware version
# PV: stringin
###############################################################################
get_hardware_version {
    out "HDW";
    enquery;
    in  "%#s";
}

###############################################################################
# PRn - Pressure of a single gauge (1..6)
# $1 = channel number (1-6)
# $2 = PV prefix for status
# Returns: status,pressure
# Status: 0=OK, 1=underrange, 2=overrange, 3=sensor error,
#         4=sensor off, 5=no gauge, 6=identification error
###############################################################################
getPressure {
    out "PR\$1";
    enquery;
    @mismatch {
        in NAK;
    }
    in "%(\$2)i,%E";
}

###############################################################################
# PRX - Pressure of all 6 gauges
# Returns: s1,p1,s2,p2,s3,p3,s4,p4,s5,p5,s6,p6
# PV: stringin (raw), parsed by aSub
###############################################################################
get_pressures_all {
    out "PRX";
    enquery_with_error;
    in "%#s";
}

###############################################################################
# TID - Gauge identification (all 6 channels)
# Returns: type1,type2,type3,type4,type5,type6
# Types: TPR/PCR, IKR, PKR, PBR, IMR, CMR/APR, noSENSOR, noIDENT
###############################################################################
get_gauge_ids_raw {
    out "TID";
    enquery;
    in "%#s";
}

get_gauge_ids {
    out "TID";
    enquery_with_error;
    in "%(\$1)[_a-zA-Z0-9/ ],%(\$2)[_a-zA-Z0-9/ ],%(\$3)[_a-zA-Z0-9/ ],%(\$4)[_a-zA-Z0-9/ ],%(\$5)[_a-zA-Z0-9/ ],%(\$6)[_a-zA-Z0-9/ ]";
}

###############################################################################
# ERR - Error status
# Returns: 4-digit error word (e.g. 0000)
# 0000=no error, 1000=ERROR, 0100=NO HWR, 0010=PAR, 0001=SYN
###############################################################################
getErrorStatus {
    out "ERR";
    enquery;
    in "%b";
}

###############################################################################
# UNI - Unit of measurement
# 0=mbar/bar, 1=Torr, 2=Pascal, 3=Micron, 4=hPascal(default), 5=Volt
###############################################################################
getUnits {
    out "UNI";
    enquery;
    in "%d";
}

setUnits {
    out "UNI,%d";
    enquery;
    in "%d";
    @init { getUnits; }
}

###############################################################################
# SEN - Switching gauges on/off
# Send: SEN [,a,b,c,d,e,f]  (0=no change, 1=off, 2=on)
# Receive: a,b,c,d,e,f      (0=cannot switch, 1=off, 2=on)
###############################################################################
get_sensor_modes {
    out "SEN";
    enquery;
    in "%(A)d,%(B)d,%(C)d,%(D)d,%(E)d,%(F)d";
}

set_sensor_mode_1 {
    out "SEN,%(\$1)d,0,0,0,0,0";
    enquery_with_error;
    in "%(\$2)d,%*d,%*d,%*d,%*d,%*d";
}

set_sensor_mode_2 {
    out "SEN,0,%(\$1)d,0,0,0,0";
    enquery_with_error;
    in "%*d,%(\$2)d,%*d,%*d,%*d,%*d";
}

set_sensor_mode_3 {
    out "SEN,0,0,%(\$1)d,0,0,0";
    enquery_with_error;
    in "%*d,%*d,%(\$2)d,%*d,%*d,%*d";
}

set_sensor_mode_4 {
    out "SEN,0,0,0,%(\$1)d,0,0";
    enquery_with_error;
    in "%*d,%*d,%*d,%(\$2)d,%*d,%*d";
}

set_sensor_mode_5 {
    out "SEN,0,0,0,0,%(\$1)d,0";
    enquery_with_error;
    in "%*d,%*d,%*d,%*d,%(\$2)d,%*d";
}

set_sensor_mode_6 {
    out "SEN,0,0,0,0,0,%(\$1)d";
    enquery_with_error;
    in "%*d,%*d,%*d,%*d,%*d,%(\$2)d";
}

###############################################################################
# FIL - Measured value filter
# 0=off, 1=fast, 2=normal, 3=slow
###############################################################################
get_filters {
    out "FIL";
    enquery;
    in "%(A)d,%(B)d,%(C)d,%(D)d,%(E)d,%(F)d";
}

set_filter_1 {
    out "FIL,%(\$1)d,0,0,0,0,0";
    enquery_with_error;
    in "%(\$2)d,%*d,%*d,%*d,%*d,%*d";
}

set_filter_2 {
    out "FIL,0,%(\$1)d,0,0,0,0";
    enquery_with_error;
    in "%*d,%(\$2)d,%*d,%*d,%*d,%*d";
}

set_filter_3 {
    out "FIL,0,0,%(\$1)d,0,0,0";
    enquery_with_error;
    in "%*d,%*d,%(\$2)d,%*d,%*d,%*d";
}

set_filter_4 {
    out "FIL,0,0,0,%(\$1)d,0,0";
    enquery_with_error;
    in "%*d,%*d,%*d,%(\$2)d,%*d,%*d";
}

set_filter_5 {
    out "FIL,0,0,0,0,%(\$1)d,0";
    enquery_with_error;
    in "%*d,%*d,%*d,%*d,%(\$2)d,%*d";
}

set_filter_6 {
    out "FIL,0,0,0,0,0,%(\$1)d";
    enquery_with_error;
    in "%*d,%*d,%*d,%*d,%*d,%(\$2)d";
}

###############################################################################
# SPS - Switching function status (all 6)
# Returns: s1,s2,s3,s4,s5,s6  (0=off, 1=on)
###############################################################################
get_switching_status {
    ExtraInput = Ignore;
    out "SPS";
    enquery;
    in "%(\$1:1:RB)d,%(\$1:2:RB)d,%(\$1:3:RB)d,%(\$1:4:RB)d,%(\$1:5:RB)d,%(\$1:6:RB)d";
}

###############################################################################
# SPx - Switching function 1..6
# Send: SPx [,a,lower,upper]
#   a: 0=off,1=on,2-7=ch1-ch6
#   lower/upper: threshold values in exponential form
# Receive: a,lower,upper
###############################################################################
getFunction {
    ExtraInput = Ignore;
    out "SP\$1";
    in ACK;
    out ENQ;
    in "%(\$2:LOW:SP:RBV)E,%(\$2:HIGH:SP:RBV)E,%(\$2:ASSIGN:SP:RBV)i";
}

setFunction {
    out "SP\$1,%(\$2:ASSIGN:SP)d,%(\$2:LOW:SP).1E,%(\$2:HIGH:SP).1E%#/E(\+|-)0(\d)/E\1\2/";
    in ACK;
    out ENQ;
    in "%s";
}

###############################################################################
# DGS - Degas (per channel)
# 0=off, 1=on (3 minutes)
###############################################################################
get_degas {
    out "DGS";
    enquery;
    in "%(A)d,%(B)d,%(C)d,%(D)d,%(E)d,%(F)d";
}

set_degas_1 {
    out "DGS,%(\$1)d,0,0,0,0,0";
    enquery_with_error;
    in "%(\$2)d,%*d,%*d,%*d,%*d,%*d";
}

set_degas_2 {
    out "DGS,0,%(\$1)d,0,0,0,0";
    enquery_with_error;
    in "%*d,%(\$2)d,%*d,%*d,%*d,%*d";
}

set_degas_3 {
    out "DGS,0,0,%(\$1)d,0,0,0";
    enquery_with_error;
    in "%*d,%*d,%(\$2)d,%*d,%*d,%*d";
}

set_degas_4 {
    out "DGS,0,0,0,%(\$1)d,0,0";
    enquery_with_error;
    in "%*d,%*d,%*d,%(\$2)d,%*d,%*d";
}

set_degas_5 {
    out "DGS,0,0,0,0,%(\$1)d,0";
    enquery_with_error;
    in "%*d,%*d,%*d,%*d,%(\$2)d,%*d";
}

set_degas_6 {
    out "DGS,0,0,0,0,0,%(\$1)d";
    enquery_with_error;
    in "%*d,%*d,%*d,%*d,%*d,%(\$2)d";
}

###############################################################################
# GAS - Gas type correction (per channel)
# 0=N2/air, 1=Argon, 2=Hydrogen, 3=Helium, 4=Neon, 5=Krypton, 6=Xenon, 7=Other
###############################################################################
get_gas_type {
    out "GAS";
    enquery;
    in "%(A)d,%(B)d,%(C)d,%(D)d,%(E)d,%(F)d";
}

###############################################################################
# BAU - Baud rate
# 0=9600, 1=19200, 2=38400, 3=57600, 4=115200
###############################################################################
get_baud {
    out "BAU";
    enquery;
    in "%d";
}

###############################################################################
# PUC - Measuring underrange control
# 0=off, 1=on
###############################################################################
get_puc {
    out "PUC";
    enquery;
    in "%d";
}

set_puc {
    out "PUC,%d";
    enquery;
    in "%*d";
}

###############################################################################
# RES - Device restart
# Send: RES,1  => restart device
# Receive: list of error codes
###############################################################################
restart_device {
    out "RES,1";
    enquery;
    in "%#s";
}

###############################################################################
# RHR - Operating hours
###############################################################################
get_operating_hours {
    out "RHR";
    enquery;
    in "%d";
}

###############################################################################
# TMP - Inner temperature of device
###############################################################################
get_temperature {
    out "TMP";
    enquery;
    in "%d";
}

###############################################################################
# LOC - Input lock
# 0=off, 1=on
###############################################################################
get_keylock {
    out "LOC";
    enquery;
    in "%d";
}

set_keylock {
    out "LOC,%d";
    enquery;
    in "%*d";
}

###############################################################################
# BAL - Backlighting (0..100%)
###############################################################################
get_backlight {
    out "BAL";
    enquery;
    in "%d";
}

set_backlight {
    out "BAL,%d";
    enquery;
    in "%*d";
}

###############################################################################
# CID - Sensor name (per channel, max 8 chars)
###############################################################################
get_sensor_names_raw {
    out "CID";
    enquery;
    in "%#s";
}

###############################################################################
# ETH - Ethernet configuration
# Returns: dhcp,ip,subnet,gateway
###############################################################################
get_ethernet_raw {
    out "ETH";
    enquery;
    in "%#s";
}

###############################################################################
# MAC - Ethernet MAC address
###############################################################################
get_mac {
    out "MAC";
    enquery;
    in "%#s";
}

###############################################################################
# Generic info getter (PNR, HDW, etc.)
###############################################################################
get_info {
    out "\$1";
    enquery;
    in "%#s";
}
