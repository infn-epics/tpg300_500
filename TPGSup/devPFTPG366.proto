###############################################################################
# StreamDevice protocol file for Pfeiffer Vacuum TPG 366 MaxiGauge
# 6-channel total pressure measurement and control unit for ActiveLine gauges
#
# Compatible with the TPG366 standalone project PV naming convention.
# Protocol parameters:
#   $1 = CONTROLLER name  (PV prefix for fan-out)
#   $2 = ADDR             (RS485 address, default 1, unused for TCP)
#   $3 = extra parameter  (relay NR for setpoint protocols)
#
# No OutTerminator: ENQ must be sent clean (no trailing CR) for RS485.
# Each command out explicitly appends CR.
###############################################################################

ReplyTimeout = 500;
InTerminator = CR LF;
# No outTerminator because we need to send ENQ clean or RS485 will mess up the reply.

addr { out ESC "0\$2"; }
#handshake { wait 10; in ACK; out ENQ; wait 10; }
handshake { in ACK; out ENQ; }

###############################################################################
# Debug - generic command
###############################################################################
debug {
    #addr;
    out "%s" CR; handshake;
    in "%#s";
}

###############################################################################
# UNI,0 - Force units to mbar (called in read_status compound)
###############################################################################
set_mbar {
    #addr;
    out "UNI,0" CR; handshake; in "0";
}

###############################################################################
# DCB - Display sensor ID on device
###############################################################################
display_sensor_id {
    #addr;
    out "DCB,0,12" CR; handshake; in "0,12";
}

###############################################################################
# SAV - Save settings to EEPROM
###############################################################################
save {
    #addr;
    out "SAV,1" CR; handshake; in "0000";
}

###############################################################################
# SEN - Read sensor on/off status (all 6)
# Fans out to $(CONTROLLER):ONOFFG1..6 RVAL fields
###############################################################################
read_onoff {
    #addr;
    out "SEN" CR; handshake;
    in "%(\$1:ONOFFG1.RVAL)d,"
       "%(\$1:ONOFFG2.RVAL)d,"
       "%(\$1:ONOFFG3.RVAL)d,"
       "%(\$1:ONOFFG4.RVAL)d,"
       "%(\$1:ONOFFG5.RVAL)d,"
       "%(\$1:ONOFFG6.RVAL)d";
}

###############################################################################
# SEN - Set sensor on/off per channel (0=no change, 1=off, 2=on)
###############################################################################
set_onoff1 {
    #addr;
    out "SEN,%{1|2},0,0,0,0,0" CR; handshake;
    in "%*d,%*d,%*d,%*d,%*d,%*d";
}
set_onoff2 {
    #addr;
    out "SEN,0,%{1|2},0,0,0,0" CR; handshake;
    in "%*d,%*d,%*d,%*d,%*d,%*d";
}
set_onoff3 {
    #addr;
    out "SEN,0,0,%{1|2},0,0,0" CR; handshake;
    in "%*d,%*d,%*d,%*d,%*d,%*d";
}
set_onoff4 {
    #addr;
    out "SEN,0,0,0,%{1|2},0,0" CR; handshake;
    in "%*d,%*d,%*d,%*d,%*d,%*d";
}
set_onoff5 {
    #addr;
    out "SEN,0,0,0,0,%{1|2},0" CR; handshake;
    in "%*d,%*d,%*d,%*d,%*d,%*d";
}
set_onoff6 {
    #addr;
    out "SEN,0,0,0,0,0,%{1|2}" CR; handshake;
    in "%*d,%*d,%*d,%*d,%*d,%*d";
}

###############################################################################
# PRX - Read pressure and status of all 6 gauges
# Fans out to $(CONTROLLER):STATUS1..6 and PRESSURE1..6.A
###############################################################################
read_pressure_and_status {
    #addr;
    out "PRX" CR; handshake;
    in "%(\$1:STATUS1)d,%(\$1:PRESSURE1.A)f,"
       "%(\$1:STATUS2)d,%(\$1:PRESSURE2.A)f,"
       "%(\$1:STATUS3)d,%(\$1:PRESSURE3.A)f,"
       "%(\$1:STATUS4)d,%(\$1:PRESSURE4.A)f,"
       "%(\$1:STATUS5)d,%(\$1:PRESSURE5.A)f,"
       "%(\$1:STATUS6)d,%(\$1:PRESSURE6.A)f";
}

###############################################################################
# TID - Read gauge type identification (all 6)
# Fans out to $(CONTROLLER):TYPE1..6
###############################################################################
read_gauge_type {
    #addr;
    out "TID" CR; handshake;
    in "%(\$1:TYPE1)[^,],"
       "%(\$1:TYPE2)[^,],"
       "%(\$1:TYPE3)[^,],"
       "%(\$1:TYPE4)[^,],"
       "%(\$1:TYPE5)[^,],"
       "%(\$1:TYPE6)[^,]";
}

###############################################################################
# CID - Read sensor names (all 6)
# Fans out to $(CONTROLLER):NAME1..6
###############################################################################
read_names {
    #addr;
    out "CID" CR; handshake;
    in "%(\$1:NAME1)[^,],"
       "%(\$1:NAME2)[^,],"
       "%(\$1:NAME3)[^,],"
       "%(\$1:NAME4)[^,],"
       "%(\$1:NAME5)[^,],"
       "%(\$1:NAME6)[^,]";
}

###############################################################################
# CID - Write sensor names (all 6) + save
###############################################################################
set_names {
    #addr;
    out "CID,%(\$1:NAME1).8s,"
            "%(\$1:NAME2).8s,"
            "%(\$1:NAME3).8s,"
            "%(\$1:NAME4).8s,"
            "%(\$1:NAME5).8s,"
            "%(\$1:NAME6).8s" CR;
    handshake;
    in "%(\$1:NAME1)[^,],"
       "%(\$1:NAME2)[^,],"
       "%(\$1:NAME3)[^,],"
       "%(\$1:NAME4)[^,],"
       "%(\$1:NAME5)[^,],"
       "%(\$1:NAME6)[^,]";
    save;
}

###############################################################################
# GAS - Read gas correction (all 6)
# Fans out to $(CONTROLLER):GAS1..6
###############################################################################
read_gas {
    #addr;
    out "GAS" CR; handshake;
    in "%(\$1:GAS1)d,"
       "%(\$1:GAS2)d,"
       "%(\$1:GAS3)d,"
       "%(\$1:GAS4)d,"
       "%(\$1:GAS5)d,"
       "%(\$1:GAS6)d";
}

###############################################################################
# GAS - Write gas correction (all 6)
###############################################################################
set_gas {
    #addr;
    out "GAS,%(\$1:GAS1)d,"
            "%(\$1:GAS2)d,"
            "%(\$1:GAS3)d,"
            "%(\$1:GAS4)d,"
            "%(\$1:GAS5)d,"
            "%(\$1:GAS6)d" CR;
    handshake;
    in "%(\$1:GAS1)d,"
       "%(\$1:GAS2)d,"
       "%(\$1:GAS3)d,"
       "%(\$1:GAS4)d,"
       "%(\$1:GAS5)d,"
       "%(\$1:GAS6)d";
}

###############################################################################
# Compound: read_status (fast scan ~1s)
# Forces mbar units, reads sensor on/off, reads pressures + statuses
###############################################################################
read_status {
    set_mbar;
    read_onoff;
    read_pressure_and_status;
}

###############################################################################
# Compound: read_infos (slow scan ~10s)
# Reads gauge types, sensor names, gas corrections
###############################################################################
read_infos {
    read_gauge_type;
    read_names;
    read_gas;
}

###############################################################################
# SPS - Read relay status (all 6)
# Fans out to $(CONTROLLER):RELAY1..6
###############################################################################
read_relay_status {
    #addr;
    out "SPS" CR; handshake;
    in "%(\$1:RELAY1){0|1},"
       "%(\$1:RELAY2){0|1},"
       "%(\$1:RELAY3){0|1},"
       "%(\$1:RELAY4){0|1},"
       "%(\$1:RELAY5){0|1},"
       "%(\$1:RELAY6){0|1}";
}

###############################################################################
# SPx - Read relay setpoint ($3 = relay number 1..6)
# Fans out to $(CONTROLLER):RELAY$3-SOURCE, -LOW, -HIGH
###############################################################################
get_relay_setpoint {
    #addr;
    out "SP\$3" CR; handshake;
    in "%(\$1:RELAY\$3-SOURCE)d,%(\$1:RELAY\$3-LOW)E,%(\$1:RELAY\$3-HIGH)E";
}

###############################################################################
# SPx - Write relay setpoint ($3 = relay number 1..6) + save
###############################################################################
set_relay_setpoint {
    #addr;
    out "SP\$3,%(\$1:RELAY\$3-SOURCE)d,%(\$1:RELAY\$3-LOW).4E,%(\$1:RELAY\$3-HIGH).4E" CR;
    handshake;
    in "%(\$1:RELAY\$3-SOURCE)d,%(\$1:RELAY\$3-LOW)E,%(\$1:RELAY\$3-HIGH)E";
    save;
}

###############################################################################
# Extra device-level protocols (not in TPG366 standalone project)
# These are standalone (no PV redirect) for device info records
###############################################################################

# PNR - Firmware version
get_firmware_version {
    #addr;
    out "PNR" CR; handshake;
    in "%#s";
}

# HDW - Hardware version
get_hardware_version {
    #addr;
    out "HDW" CR; handshake;
    in "%#s";
}

# ERR - Error status (binary word)
getErrorStatus {
    #addr;
    out "ERR" CR; handshake;
    in "%b";
}

# UNI - Read units
getUnits {
    #addr;
    out "UNI" CR; handshake;
    in "%d";
}

# TMP - Device temperature
get_temperature {
    #addr;
    out "TMP" CR; handshake;
    in "%d";
}

# RHR - Operating hours
get_operating_hours {
    #addr;
    out "RHR" CR; handshake;
    in "%d";
}

# LOC - Keylock read/write
get_keylock {
    #addr;
    out "LOC" CR; handshake;
    in "%d";
}

set_keylock {
    #addr;
    out "LOC,%d" CR; handshake;
    in "%*d";
}
